name: Android Dev Build

on:
  push:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Patch config for dev
        env:
          DEV_URL: ${{ secrets.DEV_SERVER_URL }}
        run: |
          node -e "
            const fs = require('fs');
            let c = fs.readFileSync('capacitor.config.ts', 'utf8');
            c = c.replace('com.tradex.terminal', 'com.tradex.terminal.dev');
            c = c.replace('appName: \"TradeX\"', 'appName: \"TradeX Dev\"');
            c = c.replace(/url:\s*\"[^\"]+\"/, 'url: \"' + process.env.DEV_URL + '\"');
            fs.writeFileSync('capacitor.config.ts', c);
          "
      - name: Create assets dir
        run: mkdir -p android/app/src/main/assets
      - run: npx cap sync android
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradeX-Dev
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
